name = "avas-api-gateway"
main = "worker.js"
compatibility_date = "2024-01-01"

# Account ID - get this from your Cloudflare dashboard
# account_id = "your-account-id-here"

# Secrets (set via `wrangler secret put <NAME>`):
#
# ── Supabase ──────────────────────────────────────────
#   SUPABASE_URL              - Supabase project URL (https://xxx.supabase.co)
#   SUPABASE_JWT_SECRET       - Supabase JWT secret (Settings > API > JWT Secret)
#   SUPABASE_SERVICE_ROLE_KEY - Supabase service role key (bypasses RLS)
#
# ── Stripe ────────────────────────────────────────────
#   STRIPE_SECRET_KEY         - Stripe secret key (sk_live_... or sk_test_...)
#   STRIPE_WEBHOOK_SECRET     - Stripe webhook signing secret (whsec_...)
#
# ── AI APIs ───────────────────────────────────────────
#   GEMINI_API_KEY            - Google Gemini API key
#   GOOGLE_SERVICE_ACCOUNT_KEY - Google service account JSON (for Vertex AI / Veo)
#   GOOGLE_PROJECT_ID         - Google Cloud project ID
#   KLING_PIAPI_API_KEY       - PiAPI key for Kling video
#   KLING_ULAZAI_API_KEY      - UlazAI key for Kling video
#   KLING_WAVESPEEDAI_API_KEY - WaveSpeedAI key for Kling video
#
# ── Document APIs ─────────────────────────────────────
#   CONVERTAPI_SECRET         - ConvertAPI secret
#   ILOVEPDF_PUBLIC_KEY       - iLovePDF public key
#
# ── Email ─────────────────────────────────────────────
#   RESEND_API_KEY            - Resend API key for transactional emails
#   EMAIL_FROM                - From address (e.g. "AVAS <noreply@avas.ai>")

[env.production]
name = "avas-api-gateway-prod"
