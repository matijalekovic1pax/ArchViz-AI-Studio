name = "archviz-api-gateway"
main = "worker.js"
compatibility_date = "2024-01-01"

[observability]
enabled = true
head_sampling_rate = 1

[vars]
APPWRITE_ENDPOINT = "https://fra.cloud.appwrite.io/v1"
APPWRITE_PROJECT_ID = "6a28198a0007906d225d"
APPWRITE_DATABASE_ID = "archviz_reports"
APPWRITE_REPORTS_COLLECTION_ID = "feedback_reports"
APPWRITE_ACTIVITY_COLLECTION_ID = "feedback_activity"
APPWRITE_ADMINS_COLLECTION_ID = "feedback_admins"
APPWRITE_SNAPSHOTS_BUCKET_ID = "feedback_snapshots"

# Account ID - get this from your Cloudflare dashboard
# account_id = "your-account-id-here"

# Secrets (set via `wrangler secret put <NAME>`):
#   JWT_SECRET            - Random 256-bit secret for signing JWTs
#   GOOGLE_CLIENT_ID      - Google OAuth Client ID
#   ALLOWED_DOMAIN        - Allowed Google Workspace domain (e.g. "1pax.com")
#   GEMINI_API_KEY        - Google Gemini API key
#   OPENAI_API_KEY        - OpenAI API key for ChatGPT Image Generation 2 / gpt-image-2
#   VERTEX_AI_TOKEN       - Vertex AI OAuth token (optional, for legacy Veo)
#   GOOGLE_PROJECT_ID     - Google Cloud project ID (optional, for legacy Veo)
#   KLING_PIAPI_API_KEY   - PiAPI key for Kling video
#   KLING_ULAZAI_API_KEY  - UlazAI key for Kling video
#   KLING_WAVESPEEDAI_API_KEY - WaveSpeedAI key for Kling video
#   CONVERTAPI_SECRET     - ConvertAPI secret
#   ILOVEPDF_PUBLIC_KEY   - iLovePDF public key
#   APPWRITE_ENDPOINT     - Appwrite Cloud endpoint, e.g. https://fra.cloud.appwrite.io/v1
#   APPWRITE_PROJECT_ID   - Appwrite project ID
#   APPWRITE_API_KEY      - Server API key for feedback database/storage
#   APPWRITE_DATABASE_ID  - Optional, defaults to archviz_reports
#   APPWRITE_REPORTS_COLLECTION_ID   - Optional, defaults to feedback_reports
#   APPWRITE_ACTIVITY_COLLECTION_ID  - Optional, defaults to feedback_activity
#   APPWRITE_ADMINS_COLLECTION_ID    - Optional, defaults to feedback_admins
#   APPWRITE_SNAPSHOTS_BUCKET_ID     - Optional, defaults to feedback_snapshots
#   SUPABASE_URL                     - Supabase project URL for generation logs / legacy feedback fallback
#   SUPABASE_SERVICE_ROLE_KEY        - Server-only Supabase service role key
#   SUPABASE_FEEDBACK_BUCKET         - Optional, defaults to feedback-snapshots

[env.production]
name = "archviz-api-gateway-prod"

[env.production.vars]
APPWRITE_ENDPOINT = "https://fra.cloud.appwrite.io/v1"
APPWRITE_PROJECT_ID = "6a28198a0007906d225d"
APPWRITE_DATABASE_ID = "archviz_reports"
APPWRITE_REPORTS_COLLECTION_ID = "feedback_reports"
APPWRITE_ACTIVITY_COLLECTION_ID = "feedback_activity"
APPWRITE_ADMINS_COLLECTION_ID = "feedback_admins"
APPWRITE_SNAPSHOTS_BUCKET_ID = "feedback_snapshots"
