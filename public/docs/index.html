<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchViz AI Studio — Documentation</title>
  <meta name="description" content="ArchViz AI Studio documentation, feature guide, and documentation assistant." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f7f4;
      --surface: #ffffff;
      --surface-soft: #f1f2ee;
      --surface-warm: #ebe4d7;
      --surface-cool: #edf4ff;
      --ink: #171717;
      --ink-soft: #444642;
      --ink-muted: #777970;
      --line: #deded7;
      --line-strong: #c9c8bd;
      --accent: #1d4ed8;
      --accent-soft: #dbeafe;
      --gold: #b69f72;
      --green: #15803d;
      --orange: #c26718;
      --red: #dc2626;
      --sidebar: 280px;
      --header: 64px;
      --radius: 8px;
      --shadow: 0 14px 42px rgba(23, 23, 23, 0.11);
      --font: "Inter", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      --ease: 160ms cubic-bezier(.4,0,.2,1);
    }
    html { scroll-behavior: smooth; scroll-padding-top: calc(var(--header) + 20px); }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.58;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    button, input, textarea, select { font: inherit; }
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-thumb { background: #c8c8bf; border-radius: 999px; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      grid-template-rows: var(--header) 1fr;
      grid-template-areas: "header header" "nav main";
    }
    .topbar {
      grid-area: header;
      position: sticky;
      top: 0;
      z-index: 50;
      height: var(--header);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 18px;
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 220px; }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--ink); color: white;
      display: grid; place-items: center;
      font-weight: 800; font-size: 11px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }
    .brand-title { font-size: 13px; font-weight: 800; line-height: 1.1; }
    .brand-subtitle { font-size: 11px; color: var(--ink-muted); line-height: 1.2; }
    .top-actions { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .search { position: relative; width: min(360px, 34vw); }
    .search input {
      width: 100%; height: 38px; border: 1px solid var(--line);
      border-radius: 999px; background: var(--surface-soft);
      padding: 0 14px 0 38px; outline: none; color: var(--ink);
      transition: background var(--ease), border-color var(--ease), box-shadow var(--ease);
    }
    .search input:focus { background: var(--surface); border-color: #93b4ee; box-shadow: 0 0 0 4px rgba(29,78,216,0.1); }
    .search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--ink-muted); }
    .search-results {
      display: none; position: absolute; inset: calc(100% + 8px) 0 auto 0;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; z-index: 80;
      max-height: 420px; overflow-y: auto;
    }
    .search-results.open { display: block; }
    .search-hit {
      display: grid; grid-template-columns: 28px 1fr; gap: 10px;
      padding: 10px 12px; border-bottom: 1px solid #eeeeea;
      cursor: pointer; transition: background var(--ease);
    }
    .search-hit:hover { background: var(--surface-soft); }
    .search-hit:last-child { border-bottom: 0; }
    .hit-icon { width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center; background: var(--surface-soft); border: 1px solid var(--line); font-size: 14px; }
    .hit-title { font-size: 12px; font-weight: 800; }
    .hit-section { font-size: 11px; color: var(--ink-muted); }
    mark { background: var(--accent-soft); color: var(--ink); border-radius: 3px; padding: 0 2px; }
    .select, .pill-link {
      height: 38px; border: 1px solid var(--line); border-radius: 999px;
      background: var(--surface); color: var(--ink-soft);
      padding: 0 13px; font-size: 12px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
      transition: background var(--ease), border-color var(--ease), color var(--ease);
    }
    .pill-link:hover, .select:hover { background: var(--surface-soft); border-color: var(--line-strong); color: var(--ink); }

    .sidebar {
      grid-area: nav;
      position: sticky;
      top: var(--header);
      height: calc(100vh - var(--header));
      overflow-y: auto;
      background: rgba(255,255,255,0.72);
      border-right: 1px solid var(--line);
      padding: 20px 12px 32px;
    }
    .nav-block { margin-bottom: 18px; }
    .nav-label {
      padding: 0 10px 7px;
      font-size: 10px; font-weight: 800; color: var(--ink-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .nav-link {
      width: 100%;
      display: flex; align-items: center; gap: 8px;
      min-height: 32px; border-radius: 8px;
      padding: 6px 10px;
      color: var(--ink-soft); text-decoration: none;
      font-size: 12.5px; font-weight: 650;
      transition: background var(--ease), color var(--ease);
    }
    .nav-link:hover, .nav-link.active { background: var(--surface-warm); color: var(--ink); }
    .nav-dot { width: 5px; height: 5px; border-radius: 999px; background: var(--line-strong); flex-shrink: 0; }
    .nav-link.active .nav-dot { background: var(--gold); }

    .main {
      grid-area: main;
      width: min(1180px, 100%);
      padding: 34px 44px 110px;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
      gap: 30px;
      align-items: stretch;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 30px;
    }
    .eyebrow {
      font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
      color: var(--ink-muted); text-transform: uppercase; margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(34px, 5vw, 62px);
      line-height: 0.96;
      letter-spacing: -0.04em;
      margin-bottom: 15px;
    }
    .hero-lead { max-width: 680px; color: var(--ink-soft); font-size: 16px; line-height: 1.7; }
    .hero-panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #fff, #f3f3ef);
      padding: 18px;
      display: grid;
      gap: 12px;
      align-content: start;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }
    .hero-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat {
      min-height: 76px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
    }
    .stat strong { display: block; font-size: 25px; line-height: 1; margin-bottom: 7px; }
    .stat span { color: var(--ink-muted); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; }

    .section { margin: 42px 0; }
    .section-head {
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 18px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
    }
    .section h2 { font-size: 24px; letter-spacing: -0.03em; line-height: 1.12; }
    .section-lead { max-width: 680px; color: var(--ink-muted); font-size: 13.5px; }
    .overview-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .overview-card, .mode-card, .reference-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .overview-card .icon {
      width: 34px; height: 34px; display: grid; place-items: center;
      border-radius: 8px; background: var(--surface-soft); border: 1px solid var(--line); margin-bottom: 12px;
    }
    .overview-card h3, .reference-card h3 { font-size: 14px; margin-bottom: 6px; }
    .overview-card p, .reference-card p { color: var(--ink-muted); font-size: 12.5px; }

    .path { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .path-step {
      border-left: 3px solid var(--gold);
      background: var(--surface);
      border-radius: 8px;
      padding: 14px;
      min-height: 116px;
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .path-step span { display: block; font-family: var(--mono); color: var(--gold); font-size: 11px; font-weight: 800; margin-bottom: 7px; }
    .path-step strong { display: block; margin-bottom: 5px; }
    .path-step p { color: var(--ink-muted); font-size: 12px; }

    .mode-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .mode-card { padding: 0; overflow: hidden; scroll-margin-top: calc(var(--header) + 20px); }
    .mode-top {
      display: grid;
      grid-template-columns: 46px 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbfbf8);
    }
    .mode-icon {
      width: 46px; height: 46px; border-radius: 11px;
      display: grid; place-items: center;
      background: var(--surface-soft); border: 1px solid var(--line);
      font-size: 20px;
    }
    .mode-title { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; }
    .mode-summary { margin-top: 3px; color: var(--ink-muted); font-size: 12.5px; line-height: 1.45; }
    .mode-body { padding: 16px; display: grid; gap: 14px; }
    .mode-intro { color: var(--ink-soft); font-size: 13px; }
    .mode-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mode-meta {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfbf8;
      padding: 9px 10px;
    }
    .mode-meta span { display: block; font-size: 9px; font-weight: 800; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
    .mode-meta strong { font-size: 12px; color: var(--ink-soft); }
    .doc-list h4 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--ink-muted); margin-bottom: 7px;
    }
    .doc-list ul { list-style: none; display: grid; gap: 6px; }
    .doc-list li {
      position: relative; padding-left: 16px;
      color: var(--ink-soft); font-size: 12.5px; line-height: 1.55;
    }
    .doc-list li::before {
      content: ""; position: absolute; left: 3px; top: 9px;
      width: 4px; height: 4px; border-radius: 999px; background: var(--gold);
    }
    .reference-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .reference-card ul { list-style: none; display: grid; gap: 7px; margin-top: 10px; }
    .reference-card li { color: var(--ink-soft); font-size: 12.5px; }
    code, kbd {
      font-family: var(--mono);
      border: 1px solid var(--line);
      background: var(--surface-soft);
      border-radius: 5px;
      padding: 1px 5px;
      font-size: 11px;
    }

    .doc-chat-launcher {
      position: fixed; right: 22px; bottom: 22px; z-index: 120;
      height: 46px; padding: 0 16px; border: 1px solid rgba(23,23,23,0.1);
      border-radius: 999px; background: var(--ink); color: #fff;
      display: inline-flex; align-items: center; gap: 9px;
      font-weight: 800; font-size: 12px; cursor: pointer;
      box-shadow: var(--shadow); transition: transform var(--ease), box-shadow var(--ease);
    }
    .doc-chat-launcher:hover { transform: translateY(-1px); box-shadow: 0 18px 48px rgba(0,0,0,0.18); }
    .doc-chat-panel {
      position: fixed; right: 22px; bottom: 82px; z-index: 130;
      width: min(440px, calc(100vw - 28px)); height: min(700px, calc(100vh - 110px));
      display: none; grid-template-rows: auto auto 1fr auto;
      border: 1px solid var(--line); border-radius: 16px; overflow: hidden;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.18);
    }
    .doc-chat-panel.open { display: grid; animation: chat-in 180ms ease-out both; }
    @keyframes chat-in { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
    .chat-head {
      display: grid; grid-template-columns: 38px 1fr auto; gap: 11px; align-items: center;
      padding: 15px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, #fff, #f8f8f4);
    }
    .chat-mark { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 10px; background: var(--accent-soft); color: var(--accent); border: 1px solid #bfdbfe; }
    .chat-title strong { display: block; font-size: 13px; }
    .chat-title span { display: block; font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
    .icon-button {
      border: 1px solid transparent; background: transparent; color: var(--ink-muted);
      width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center;
      cursor: pointer; transition: background var(--ease), color var(--ease), border-color var(--ease);
    }
    .icon-button:hover { background: var(--surface-soft); color: var(--ink); border-color: var(--line); }
    .chat-context {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
      color: #475569; font-size: 11px;
    }
    .chat-status { display: inline-flex; align-items: center; gap: 7px; min-width: 0; }
    .chat-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--green); box-shadow: 0 0 0 3px rgba(21,128,61,0.12); flex-shrink: 0; }
    .chat-model { font-family: var(--mono); color: #64748b; white-space: nowrap; }
    .chat-messages { overflow-y: auto; padding: 14px; background: linear-gradient(180deg, rgba(248,250,252,.72), rgba(255,255,255,.94)); }
    .chat-message { display: flex; margin-bottom: 12px; align-items: flex-start; }
    .chat-message.user { justify-content: flex-end; }
    .chat-bubble {
      max-width: 88%; border: 1px solid var(--line); border-radius: 13px; background: #fff;
      padding: 10px 12px; color: var(--ink-soft); font-size: 12.5px; line-height: 1.55;
      white-space: pre-wrap; overflow-wrap: anywhere;
    }
    .chat-message.user .chat-bubble { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chat-bubble a { color: var(--accent); font-weight: 800; text-decoration: none; border-bottom: 1px solid rgba(29,78,216,.25); }
    .chat-message.user .chat-bubble a { color: #fff; border-bottom-color: rgba(255,255,255,.42); }
    .chat-source-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chat-source {
      display: inline-flex; align-items: center; min-height: 22px; border: 1px solid #bfdbfe; border-radius: 999px;
      padding: 0 8px; background: #eff6ff; color: var(--accent); font-size: 10.5px; font-weight: 800; text-decoration: none;
    }
    .chat-suggestions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .chip {
      border: 1px solid #d8e2f2; border-radius: 999px; background: #fff; color: #334155;
      padding: 7px 10px; font-size: 11px; font-weight: 800; cursor: pointer;
    }
    .chip:hover { background: #eff6ff; border-color: #bfdbfe; color: var(--accent); }
    .chat-form { border-top: 1px solid var(--line); background: #fff; padding: 11px; display: grid; gap: 8px; }
    .attachment-preview {
      display: none; align-items: center; gap: 8px;
      border: 1px solid #bfdbfe; background: #eff6ff; color: #1e3a8a;
      border-radius: 10px; padding: 7px 8px; font-size: 11px; font-weight: 700;
    }
    .attachment-preview.open { display: flex; }
    .attachment-preview img { width: 34px; height: 34px; border-radius: 7px; object-fit: cover; border: 1px solid #bfdbfe; }
    .chat-input-row { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: end; }
    .chat-input {
      min-height: 42px; max-height: 118px; resize: none;
      border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
      background: var(--surface-soft); outline: none; color: var(--ink); font-size: 13px;
    }
    .chat-input:focus { background: #fff; border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(29,78,216,.1); }
    .send-button {
      width: 42px; height: 42px; border: 1px solid var(--accent); border-radius: 12px;
      background: var(--accent); color: #fff; display: grid; place-items: center; cursor: pointer;
    }
    .send-button:disabled { opacity: .55; cursor: not-allowed; }
    .typing { display: inline-flex; align-items: center; gap: 4px; padding: 11px 12px; }
    .typing span { width: 5px; height: 5px; border-radius: 999px; background: #94a3b8; animation: dot 900ms ease-in-out infinite; }
    .typing span:nth-child(2) { animation-delay: 120ms; }
    .typing span:nth-child(3) { animation-delay: 240ms; }
    @keyframes dot { 0%,80%,100% { transform: translateY(0); opacity: .45; } 40% { transform: translateY(-3px); opacity: 1; } }
    .highlight-target { animation: flash 1.2s ease-out; }
    @keyframes flash { 0% { box-shadow: 0 0 0 4px rgba(182,159,114,.45); } 100% { box-shadow: 0 0 0 0 rgba(182,159,114,0); } }

    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; grid-template-areas: "header" "main"; }
      .sidebar { display: none; }
      .main { padding: 24px 18px 96px; }
      .hero { grid-template-columns: 1fr; }
      .overview-grid, .path, .mode-grid, .reference-grid { grid-template-columns: 1fr; }
      .search { width: min(320px, 42vw); }
    }
    @media (max-width: 680px) {
      .topbar { height: auto; min-height: var(--header); flex-wrap: wrap; padding: 10px 12px; }
      .brand { min-width: auto; }
      .top-actions { width: 100%; }
      .search { width: 100%; flex: 1; }
      .pill-link span { display: none; }
      .hero-stat-grid, .mode-meta-grid { grid-template-columns: 1fr; }
      .doc-chat-panel { right: 10px; bottom: 72px; width: calc(100vw - 20px); height: min(660px, calc(100vh - 90px)); }
      .doc-chat-launcher { right: 14px; bottom: 14px; }
      .chat-model { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">AV</div>
        <div>
          <div class="brand-title">ArchViz AI Studio</div>
          <div class="brand-subtitle" data-i18n="manualLabel">Documentation</div>
        </div>
      </div>
      <div class="top-actions">
        <div class="search" id="searchWrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="searchInput" type="search" autocomplete="off" spellcheck="false" />
          <div class="search-results" id="searchResults"></div>
        </div>
        <select id="languageSelect" class="select" aria-label="Language">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="zh">中文</option>
        </select>
        <a class="pill-link" href="/" id="backToApp">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m15 18-6-6 6-6"/></svg>
          <span data-i18n="backToApp">Back to app</span>
        </a>
      </div>
    </header>

    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>

    <button class="doc-chat-launcher" id="docChatLauncher" type="button" aria-expanded="false" aria-controls="docChatPanel">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/><path d="M8 9h8M8 13h5"/></svg>
      <span id="chatLauncherText">Ask the manual</span>
    </button>

    <section class="doc-chat-panel" id="docChatPanel" aria-label="Documentation assistant">
      <div class="chat-head">
        <div class="chat-mark">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.7L20 11l-6.1 2.3L12 19l-1.9-5.7L4 11l6.1-2.3L12 3z"/></svg>
        </div>
        <div class="chat-title">
          <strong id="chatTitle">Documentation Assistant</strong>
          <span id="chatSubtitle">Ask how to use ArchViz AI Studio.</span>
        </div>
        <button class="icon-button" id="docChatClose" type="button" aria-label="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="chat-context">
        <div class="chat-status"><span class="chat-dot" id="docChatStatusDot"></span><span id="docChatStatus">Manual connected</span></div>
        <div class="chat-model" id="docChatModel">gemini-3.1-pro-preview</div>
      </div>
      <div class="chat-messages" id="docChatMessages" role="log" aria-live="polite"></div>
      <form class="chat-form" id="docChatForm">
        <div class="attachment-preview" id="attachmentPreview">
          <img id="attachmentThumb" alt="" />
          <span id="attachmentName"></span>
          <button class="icon-button" id="removeAttachment" type="button" aria-label="Remove image">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="chat-input-row">
          <input id="docChatImageInput" type="file" accept="image/*" hidden />
          <button class="icon-button" id="attachImageButton" type="button" aria-label="Attach image">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>
          </button>
          <textarea class="chat-input" id="docChatInput" rows="1"></textarea>
          <button class="send-button" id="docChatSend" type="submit" aria-label="Send">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          </button>
        </div>
      </form>
    </section>
  </div>

  <script src="./docs-data.js"></script>
  <script>
    const REQUESTED_MODEL = "gemini-3.1-pro-preview";
    const FALLBACK_MODEL = "gemini-3-pro-preview";
    const PROD_GATEWAY = "https://archviz-api-gateway.matija-lekovic.workers.dev";
    const JWT_SESSION_KEY = "archviz_jwt";
    const HANDOFF_KEY = "archviz_docs_auth_handoff";
    const SUPPORTED_LANGS = ["en", "es", "fr", "zh"];

    let lang = detectLanguage();
    let doc = window.AVAS_DOCS[lang];
    let searchIndex = [];
    let chatHistory = [];
    let selectedImage = null;

    const els = {
      main: document.getElementById("main"),
      sidebar: document.getElementById("sidebar"),
      searchInput: document.getElementById("searchInput"),
      searchResults: document.getElementById("searchResults"),
      searchWrap: document.getElementById("searchWrap"),
      languageSelect: document.getElementById("languageSelect"),
      chatLauncher: document.getElementById("docChatLauncher"),
      chatPanel: document.getElementById("docChatPanel"),
      chatClose: document.getElementById("docChatClose"),
      chatMessages: document.getElementById("docChatMessages"),
      chatForm: document.getElementById("docChatForm"),
      chatInput: document.getElementById("docChatInput"),
      chatSend: document.getElementById("docChatSend"),
      chatStatus: document.getElementById("docChatStatus"),
      chatDot: document.getElementById("docChatStatusDot"),
      chatModel: document.getElementById("docChatModel"),
      chatTitle: document.getElementById("chatTitle"),
      chatSubtitle: document.getElementById("chatSubtitle"),
      chatLauncherText: document.getElementById("chatLauncherText"),
      imageInput: document.getElementById("docChatImageInput"),
      attachButton: document.getElementById("attachImageButton"),
      attachmentPreview: document.getElementById("attachmentPreview"),
      attachmentThumb: document.getElementById("attachmentThumb"),
      attachmentName: document.getElementById("attachmentName"),
      removeAttachment: document.getElementById("removeAttachment"),
    };

    function detectLanguage() {
      const params = new URLSearchParams(window.location.search);
      const requested = params.get("lang");
      const stored = localStorage.getItem("archviz_docs_lang") || localStorage.getItem("i18nextLng") || "";
      const nav = navigator.language || "en";
      const candidate = (requested || stored || nav || "en").slice(0, 2).toLowerCase();
      return SUPPORTED_LANGS.includes(candidate) ? candidate : "en";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderInline(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    }

    function list(items) {
      return `<ul>${items.map((item) => `<li>${renderInline(item)}</li>`).join("")}</ul>`;
    }

    function renderPage() {
      doc = window.AVAS_DOCS[lang];
      document.documentElement.lang = lang;
      document.title = doc.meta.title;
      localStorage.setItem("archviz_docs_lang", lang);
      els.languageSelect.value = lang;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = doc.ui[node.dataset.i18n] || node.textContent;
      });
      els.searchInput.placeholder = doc.ui.searchPlaceholder;
      els.chatLauncherText.textContent = doc.chat.launcher;
      els.chatTitle.textContent = doc.chat.title;
      els.chatSubtitle.textContent = doc.chat.subtitle;
      els.chatInput.placeholder = doc.chat.placeholder;
      els.attachButton.setAttribute("aria-label", doc.chat.attachImage);
      els.removeAttachment.setAttribute("aria-label", doc.chat.removeImage);

      renderSidebar();
      renderMain();
      buildSearchIndex();
      resetChatIntro();
      setChatStatus(getDocsGatewayToken() ? doc.chat.connected : doc.chat.signInRequired, getDocsGatewayToken() ? "ready" : "warn");
    }

    function renderSidebar() {
      const blocks = [
        { label: doc.nav.start, links: [
          { id: "overview", label: doc.nav.overview },
          { id: "workflow", label: doc.nav.workflow },
          { id: "interface", label: doc.nav.interface },
        ]},
        { label: doc.nav.modes, links: doc.modes.map((mode) => ({ id: mode.id, label: mode.title })) },
        { label: doc.nav.reference, links: [
          { id: "settings", label: doc.reference.settings.title },
          { id: "styles", label: doc.reference.styles.title },
          { id: "shortcuts", label: doc.reference.shortcuts.title },
          { id: "troubleshooting", label: doc.reference.troubleshooting.title },
        ]},
      ];
      els.sidebar.innerHTML = blocks.map((block) => `
        <div class="nav-block">
          <div class="nav-label">${escapeHtml(block.label)}</div>
          ${block.links.map((link) => `
            <a class="nav-link" href="#${link.id}">
              <span class="nav-dot"></span>
              <span>${escapeHtml(link.label)}</span>
            </a>
          `).join("")}
        </div>
      `).join("");
    }

    function renderMain() {
      els.main.innerHTML = `
        <section class="hero" id="overview">
          <div>
            <div class="eyebrow">${escapeHtml(doc.hero.eyebrow)}</div>
            <h1>${escapeHtml(doc.hero.title)}</h1>
            <p class="hero-lead">${escapeHtml(doc.hero.lead)}</p>
          </div>
          <aside class="hero-panel">
            <div class="hero-stat-grid">
              ${doc.hero.stats.map((stat) => `<div class="stat"><strong>${escapeHtml(stat.value)}</strong><span>${escapeHtml(stat.label)}</span></div>`).join("")}
            </div>
            <p class="section-lead">${escapeHtml(doc.hero.note)}</p>
          </aside>
        </section>

        <section class="section">
          <div class="section-head">
            <div><div class="eyebrow">${escapeHtml(doc.platform.eyebrow)}</div><h2>${escapeHtml(doc.platform.title)}</h2></div>
            <p class="section-lead">${escapeHtml(doc.platform.lead)}</p>
          </div>
          <div class="overview-grid">
            ${doc.platform.cards.map((card) => `<article class="overview-card"><div class="icon">${card.icon}</div><h3>${escapeHtml(card.title)}</h3><p>${escapeHtml(card.text)}</p></article>`).join("")}
          </div>
        </section>

        <section class="section" id="workflow">
          <div class="section-head">
            <div><div class="eyebrow">${escapeHtml(doc.workflow.eyebrow)}</div><h2>${escapeHtml(doc.workflow.title)}</h2></div>
            <p class="section-lead">${escapeHtml(doc.workflow.lead)}</p>
          </div>
          <div class="path">
            ${doc.workflow.steps.map((step, index) => `<article class="path-step"><span>${String(index + 1).padStart(2, "0")}</span><strong>${escapeHtml(step.title)}</strong><p>${escapeHtml(step.text)}</p></article>`).join("")}
          </div>
        </section>

        <section class="section" id="interface">
          <div class="section-head">
            <div><div class="eyebrow">${escapeHtml(doc.interface.eyebrow)}</div><h2>${escapeHtml(doc.interface.title)}</h2></div>
            <p class="section-lead">${escapeHtml(doc.interface.lead)}</p>
          </div>
          <div class="reference-grid">
            ${doc.interface.zones.map((zone) => `<article class="reference-card"><h3>${escapeHtml(zone.title)}</h3><p>${escapeHtml(zone.text)}</p></article>`).join("")}
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <div><div class="eyebrow">${escapeHtml(doc.modesIntro.eyebrow)}</div><h2>${escapeHtml(doc.modesIntro.title)}</h2></div>
            <p class="section-lead">${escapeHtml(doc.modesIntro.lead)}</p>
          </div>
          <div class="mode-grid">${doc.modes.map(renderModeCard).join("")}</div>
        </section>

        ${renderReference()}
      `;
      observeNav();
    }

    function renderModeCard(mode) {
      return `
        <article class="mode-card" id="${mode.id}">
          <div class="mode-top">
            <div class="mode-icon">${mode.icon}</div>
            <div>
              <div class="mode-title">${escapeHtml(mode.title)}</div>
              <div class="mode-summary">${escapeHtml(mode.summary)}</div>
            </div>
          </div>
          <div class="mode-body">
            <p class="mode-intro">${escapeHtml(mode.detail)}</p>
            <div class="mode-meta-grid">
              <div class="mode-meta"><span>${escapeHtml(doc.modeLabels.input)}</span><strong>${escapeHtml(mode.input)}</strong></div>
              <div class="mode-meta"><span>${escapeHtml(doc.modeLabels.output)}</span><strong>${escapeHtml(mode.output)}</strong></div>
            </div>
            <div class="doc-list"><h4>${escapeHtml(doc.modeLabels.offers)}</h4>${list(mode.offers)}</div>
            <div class="doc-list"><h4>${escapeHtml(doc.modeLabels.workflow)}</h4>${list(mode.workflow)}</div>
            <div class="doc-list"><h4>${escapeHtml(doc.modeLabels.tips)}</h4>${list(mode.tips)}</div>
          </div>
        </article>
      `;
    }

    function renderReference() {
      const ref = doc.reference;
      const blocks = [ref.settings, ref.styles, ref.shortcuts, ref.troubleshooting];
      return blocks.map((block) => `
        <section class="section" id="${block.id}">
          <div class="section-head">
            <div><div class="eyebrow">${escapeHtml(block.eyebrow)}</div><h2>${escapeHtml(block.title)}</h2></div>
            <p class="section-lead">${escapeHtml(block.lead)}</p>
          </div>
          <div class="reference-grid">
            ${block.cards.map((card) => `<article class="reference-card"><h3>${escapeHtml(card.title)}</h3><p>${escapeHtml(card.text)}</p>${card.items ? list(card.items) : ""}</article>`).join("")}
          </div>
        </section>
      `).join("");
    }

    function buildSearchIndex() {
      searchIndex = [
        { id: "overview", icon: "⌁", title: doc.nav.overview, section: doc.nav.start, text: `${doc.hero.title} ${doc.hero.lead}` },
        { id: "workflow", icon: "→", title: doc.nav.workflow, section: doc.nav.start, text: doc.workflow.steps.map((s) => `${s.title} ${s.text}`).join(" ") },
        { id: "interface", icon: "▦", title: doc.nav.interface, section: doc.nav.start, text: doc.interface.zones.map((z) => `${z.title} ${z.text}`).join(" ") },
        ...doc.modes.map((mode) => ({ id: mode.id, icon: mode.icon, title: mode.title, section: doc.nav.modes, text: [mode.summary, mode.detail, mode.input, mode.output, ...mode.offers, ...mode.workflow, ...mode.tips].join(" ") })),
        ...Object.values(doc.reference).map((block) => ({ id: block.id, icon: "•", title: block.title, section: doc.nav.reference, text: [block.lead, ...block.cards.flatMap((c) => [c.title, c.text, ...(c.items || [])])].join(" ") })),
      ];
    }

    function observeNav() {
      const navLinks = [...document.querySelectorAll(".nav-link")];
      const targets = navLinks.map((link) => document.querySelector(link.getAttribute("href"))).filter(Boolean);
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          navLinks.forEach((link) => link.classList.toggle("active", link.getAttribute("href") === `#${entry.target.id}`));
        });
      }, { rootMargin: "-20% 0px -70% 0px" });
      targets.forEach((target) => observer.observe(target));
    }

    function scrollToId(id) {
      const target = document.getElementById(id);
      if (!target) return;
      target.scrollIntoView({ behavior: "smooth", block: "start" });
      target.classList.add("highlight-target");
      target.addEventListener("animationend", () => target.classList.remove("highlight-target"), { once: true });
    }

    function performSearch(query) {
      const q = query.trim().toLowerCase();
      if (!q) { els.searchResults.innerHTML = ""; els.searchResults.classList.remove("open"); return; }
      const hits = searchIndex
        .map((item) => ({ ...item, score: scoreSearch(item, q) }))
        .filter((item) => item.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 9);
      if (!hits.length) {
        els.searchResults.innerHTML = `<div class="search-hit"><div class="hit-icon">?</div><div><div class="hit-title">${escapeHtml(doc.ui.noResults)}</div><div class="hit-section">${escapeHtml(query)}</div></div></div>`;
      } else {
        els.searchResults.innerHTML = hits.map((hit) => `<div class="search-hit" data-id="${hit.id}"><div class="hit-icon">${hit.icon}</div><div><div class="hit-title">${highlight(hit.title, query)}</div><div class="hit-section">${escapeHtml(hit.section)}</div></div></div>`).join("");
      }
      els.searchResults.classList.add("open");
    }

    function scoreSearch(item, q) {
      const title = item.title.toLowerCase();
      const text = item.text.toLowerCase();
      let score = 0;
      if (title.includes(q)) score += 12;
      q.split(/\s+/).forEach((part) => {
        if (part.length < 2) return;
        if (title.includes(part)) score += 4;
        if (text.includes(part)) score += 1;
      });
      return score;
    }

    function highlight(text, query) {
      const q = query.trim().replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return q ? escapeHtml(text).replace(new RegExp(`(${q})`, "ig"), "<mark>$1</mark>") : escapeHtml(text);
    }

    function getGatewayUrl() {
      const configured = window.AVAS_GATEWAY_URL || localStorage.getItem("archviz_gateway_url");
      if (configured) return String(configured).replace(/\/+$/, "");
      return ["localhost", "127.0.0.1", "0.0.0.0"].includes(location.hostname) ? "http://localhost:8787" : PROD_GATEWAY;
    }

    function getDocsGatewayToken() {
      const fromSession = readToken(sessionStorage.getItem(JWT_SESSION_KEY));
      if (fromSession) {
        try { localStorage.removeItem(HANDOFF_KEY); } catch {}
        return fromSession;
      }
      const handoff = readToken(localStorage.getItem(HANDOFF_KEY));
      if (handoff) {
        try {
          sessionStorage.setItem(JWT_SESSION_KEY, localStorage.getItem(HANDOFF_KEY));
          localStorage.removeItem(HANDOFF_KEY);
        } catch {}
        return handoff;
      }
      return null;
    }

    function readToken(raw) {
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        if (parsed?.token && Number(parsed.expiresAt) > Date.now()) return parsed.token;
      } catch {}
      return null;
    }

    function resetChatIntro() {
      els.chatMessages.innerHTML = `
        <div class="chat-message assistant"><div class="chat-bubble">${renderAssistantText(doc.chat.intro)}<div class="chat-suggestions">${doc.chat.suggestions.map((item) => `<button class="chip" type="button" data-prompt="${escapeHtml(item.prompt)}">${escapeHtml(item.label)}</button>`).join("")}</div></div></div>
      `;
    }

    function openChat() {
      els.chatPanel.classList.add("open");
      els.chatLauncher.setAttribute("aria-expanded", "true");
      setTimeout(() => els.chatInput.focus(), 60);
    }

    function closeChat() {
      els.chatPanel.classList.remove("open");
      els.chatLauncher.setAttribute("aria-expanded", "false");
    }

    function setChatStatus(text, tone = "ready") {
      const colors = {
        ready: ["#15803d", "rgba(21,128,61,.12)"],
        busy: ["#1d4ed8", "rgba(29,78,216,.14)"],
        warn: ["#c26718", "rgba(194,103,24,.16)"],
        error: ["#dc2626", "rgba(220,38,38,.14)"],
      };
      const [bg, glow] = colors[tone] || colors.ready;
      els.chatStatus.textContent = text;
      els.chatDot.style.background = bg;
      els.chatDot.style.boxShadow = `0 0 0 3px ${glow}`;
    }

    function renderAssistantText(text) {
      let safe = renderInline(text).replace(/\n{3,}/g, "\n\n").replace(/\n/g, "<br>");
      safe = safe.replace(/\[([^\]]+)\]\((#[a-z0-9-]+)\)/gi, (_, label, href) => {
        const id = href.slice(1);
        return document.getElementById(id) ? `<a href="${href}" data-chat-anchor>${escapeHtml(label)}</a>` : escapeHtml(label);
      });
      return safe;
    }

    function appendMessage(role, text, sources = [], imageDataUrl = null) {
      const row = document.createElement("div");
      row.className = `chat-message ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "chat-bubble";
      if (imageDataUrl) {
        bubble.innerHTML = `<img src="${imageDataUrl}" alt="" style="display:block;width:100%;max-height:160px;object-fit:cover;border-radius:9px;margin-bottom:8px;border:1px solid rgba(255,255,255,.35)" />`;
      }
      if (role === "assistant") {
        bubble.innerHTML += renderAssistantText(text);
        if (sources.length) {
          bubble.innerHTML += `<div class="chat-source-row">${sources.map((source) => `<a class="chat-source" href="#${source.id}" data-chat-anchor>${escapeHtml(source.title)}</a>`).join("")}</div>`;
        }
      } else {
        bubble.innerHTML += escapeHtml(text);
      }
      row.appendChild(bubble);
      els.chatMessages.appendChild(row);
      els.chatMessages.scrollTop = els.chatMessages.scrollHeight;
      return row;
    }

    function typingIndicator() {
      const row = document.createElement("div");
      row.className = "chat-message assistant";
      row.innerHTML = `<div class="chat-bubble typing"><span></span><span></span><span></span></div>`;
      els.chatMessages.appendChild(row);
      els.chatMessages.scrollTop = els.chatMessages.scrollHeight;
      return row;
    }

    function buildManualText() {
      const assistantGuide = (doc.assistantGuide || []).map((item) => [
        `${item.title} (#${item.anchor || item.id || "overview"})`,
        ...(item.guide || []),
      ].join("\n")).join("\n\n");
      return [
        `${doc.hero.title}: ${doc.hero.lead}`,
        doc.workflow.steps.map((s) => `${s.title}: ${s.text}`).join("\n"),
        doc.interface.zones.map((z) => `${z.title}: ${z.text}`).join("\n"),
        doc.modes.map((mode) => [
          `${mode.title} (#${mode.id})`,
          mode.summary,
          mode.detail,
          `${doc.modeLabels.input}: ${mode.input}`,
          `${doc.modeLabels.output}: ${mode.output}`,
          `${doc.modeLabels.offers}: ${mode.offers.join("; ")}`,
          `${doc.modeLabels.workflow}: ${mode.workflow.join("; ")}`,
          `${doc.modeLabels.tips}: ${mode.tips.join("; ")}`,
        ].join("\n")).join("\n\n"),
        Object.values(doc.reference).map((block) => `${block.title}: ${block.lead}\n${block.cards.map((card) => `${card.title}: ${card.text} ${(card.items || []).join("; ")}`).join("\n")}`).join("\n\n"),
        `ASSISTANT FEATURE PLAYBOOK:\n${assistantGuide}`,
      ].join("\n\n");
    }

    function buildPrompt(question) {
      const recent = chatHistory.slice(-8).map((m) => `${m.role.toUpperCase()}: ${m.content}`).join("\n") || doc.chat.noHistory;
      return [
        doc.chat.system,
        doc.chat.photoInstruction,
        doc.chat.answerRules,
        "Use the assistant feature playbook for precise, step-by-step guidance. Do not present removed or unavailable workflows as active features. If the user asks for a removed feature, explain that it is unavailable and redirect to the closest documented workflow.",
        "Answer comparison questions from the named controls in the documentation. If a requested option is not documented, say so and offer the closest documented control.",
        "Do not give generic rendering or AI theory unless it is tied directly to a named ArchViz AI Studio feature, panel, or control.",
        "Prefer practical numbered steps with exact UI locations when the user needs guidance. Include one or more relevant anchor links. Ask a clarification only when the missing information changes the recommended feature.",
        "",
        "ANCHORS:",
        searchIndex.map((item) => `${item.title}: #${item.id}`).join("\n"),
        "",
        "DOCUMENTATION:",
        buildManualText(),
        "",
        "RECENT CHAT:",
        recent,
        "",
        `QUESTION: ${question}`
      ].join("\n");
    }

    async function requestAnswer(question, image) {
      const token = getDocsGatewayToken();
      if (!token) throw new Error(doc.chat.signInError);
      const textPart = { text: buildPrompt(question) };
      const parts = image ? [textPart, { inlineData: { mimeType: image.mimeType, data: image.base64 } }] : [textPart];
      const body = {
        contents: [{ role: "user", parts }],
        generationConfig: {
          temperature: 0.2,
          topP: 0.9,
          maxOutputTokens: 1700,
          responseModalities: ["TEXT"],
          thinkingConfig: { thinkingLevel: "low" }
        }
      };
      let lastError = "";
      for (const model of [REQUESTED_MODEL, FALLBACK_MODEL]) {
        els.chatModel.textContent = model;
        const response = await fetch(`${getGatewayUrl()}/api/gemini/models/${model}:generateContent`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        if (response.ok) {
          const data = await response.json();
          const text = (data?.candidates?.[0]?.content?.parts || []).map((part) => part.text || "").join("").trim();
          return { text: text || doc.chat.emptyResponse, model };
        }
        lastError = await response.text().catch(() => `Request failed (${response.status})`);
        if (model === REQUESTED_MODEL && /model|not found|invalid|not supported|404|400/i.test(lastError)) continue;
        break;
      }
      throw new Error(lastError || doc.chat.unavailable);
    }

    function findSources(question, answer) {
      const haystack = `${question} ${answer}`.toLowerCase();
      return searchIndex
        .map((item) => ({ ...item, score: scoreSearch(item, haystack.slice(0, 240)) + (haystack.includes(item.title.toLowerCase()) ? 10 : 0) }))
        .filter((item) => item.score > 2)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);
    }

    async function submitQuestion(rawQuestion) {
      const question = rawQuestion.trim() || (selectedImage ? doc.chat.photoOnlyQuestion : "");
      if (!question) return;
      openChat();
      const image = selectedImage;
      clearAttachment();
      els.chatInput.value = "";
      els.chatInput.style.height = "auto";
      els.chatSend.disabled = true;
      appendMessage("user", question, [], image?.dataUrl);
      chatHistory.push({ role: "user", content: image ? `${question} (${doc.chat.imageAttached})` : question });
      const typing = typingIndicator();
      setChatStatus(doc.chat.thinking, "busy");
      try {
        const { text, model } = await requestAnswer(question, image);
        typing.remove();
        appendMessage("assistant", text, findSources(question, text));
        chatHistory.push({ role: "assistant", content: text });
        setChatStatus(model === REQUESTED_MODEL ? doc.chat.connected : doc.chat.connectedFallback, "ready");
      } catch (error) {
        typing.remove();
        appendMessage("assistant", error?.message || doc.chat.unavailable, [{ id: "overview", title: doc.nav.overview }]);
        setChatStatus(doc.chat.needsAttention, "error");
      } finally {
        els.chatSend.disabled = false;
        els.chatInput.focus();
      }
    }

    function clearAttachment() {
      selectedImage = null;
      els.attachmentPreview.classList.remove("open");
      els.attachmentThumb.removeAttribute("src");
      els.attachmentName.textContent = "";
      els.imageInput.value = "";
    }

    function readImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const dataUrl = String(reader.result);
          const base64 = dataUrl.split(",")[1] || "";
          resolve({ name: file.name, mimeType: file.type || "image/png", base64, dataUrl });
        };
        reader.onerror = () => reject(new Error(doc.chat.imageReadError));
        reader.readAsDataURL(file);
      });
    }

    els.languageSelect.addEventListener("change", () => {
      lang = els.languageSelect.value;
      renderPage();
    });
    els.searchInput.addEventListener("input", () => performSearch(els.searchInput.value));
    els.searchResults.addEventListener("click", (event) => {
      const hit = event.target.closest("[data-id]");
      if (!hit) return;
      els.searchResults.classList.remove("open");
      els.searchInput.value = "";
      scrollToId(hit.dataset.id);
    });
    document.addEventListener("click", (event) => {
      if (!els.searchWrap.contains(event.target)) els.searchResults.classList.remove("open");
    });
    document.addEventListener("click", (event) => {
      const anchor = event.target.closest("a[href^='#']");
      if (!anchor) return;
      const id = anchor.getAttribute("href").slice(1);
      if (!document.getElementById(id)) return;
      event.preventDefault();
      scrollToId(id);
      if (anchor.dataset.chatAnchor) closeChat();
    });
    els.chatLauncher.addEventListener("click", () => els.chatPanel.classList.contains("open") ? closeChat() : openChat());
    els.chatClose.addEventListener("click", closeChat);
    els.chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      submitQuestion(els.chatInput.value);
    });
    els.chatMessages.addEventListener("click", (event) => {
      const chip = event.target.closest("[data-prompt]");
      if (chip) submitQuestion(chip.dataset.prompt || chip.textContent || "");
    });
    els.chatInput.addEventListener("input", () => {
      els.chatInput.style.height = "auto";
      els.chatInput.style.height = `${Math.min(els.chatInput.scrollHeight, 118)}px`;
    });
    els.chatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        els.chatForm.requestSubmit();
      }
      if (event.key === "Escape") closeChat();
    });
    els.attachButton.addEventListener("click", () => els.imageInput.click());
    els.imageInput.addEventListener("change", async () => {
      const file = els.imageInput.files?.[0];
      if (!file) return;
      if (!file.type.startsWith("image/")) {
        appendMessage("assistant", doc.chat.imageTypeError);
        return;
      }
      selectedImage = await readImage(file);
      els.attachmentThumb.src = selectedImage.dataUrl;
      els.attachmentName.textContent = selectedImage.name;
      els.attachmentPreview.classList.add("open");
      openChat();
    });
    els.removeAttachment.addEventListener("click", clearAttachment);

    renderPage();
  </script>
</body>
</html>
